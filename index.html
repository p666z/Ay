<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الفطر - محمود</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #ff69b4;
            --secondary: #ff1493;
            --tertiary: #ffb6c1;
            --bg-dark: #0a0a0a;
            --bg-gradient: linear-gradient(180deg, #0f0f1a 0%, #1a0a1a 50%, #0f0f1a 100%);
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            position: relative;
        }
        
        /* Animated Background Grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(255,105,180,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,105,180,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* Radial Gradients */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,105,180,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(255,20,147,0.1) 0%, transparent 50%),
                radial-gradient(ellipse 30% 30% at 20% 60%, rgba(255,182,193,0.08) 0%, transparent 50%);
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1); 
                opacity: 0.3; 
            }
            25% { 
                transform: translateY(-20px) translateX(10px) scale(1.1); 
                opacity: 0.6; 
            }
            50% { 
                transform: translateY(-40px) translateX(-10px) scale(1); 
                opacity: 0.8; 
            }
            75% { 
                transform: translateY(-20px) translateX(5px) scale(0.9); 
                opacity: 0.5; 
            }
        }
        
        /* Main Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        
        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
                filter: blur(10px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
                filter: blur(0);
            }
        }
        
        /* Intro Scene */
        .intro {
            text-align: center;
        }
        
        /* Eid Icon */
        .icon-wrapper {
            margin-bottom: 30px;
            animation: iconFloat 3s ease-in-out infinite;
        }
        
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .eid-icon {
            font-size: 100px;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(255,105,180,0.5));
        }
        
        /* Type Badge */
        .badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,105,180,0.4);
            background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(255,20,147,0.1));
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        /* Main Title */
        .title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #ff69b4, #ff1493, #ffb6c1, #ff69b4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, glowText 2s ease-in-out infinite alternate;
            text-shadow: none;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes glowText {
            from { filter: drop-shadow(0 0 20px rgba(255,105,180,0.3)); }
            to { filter: drop-shadow(0 0 40px rgba(255,105,180,0.6)); }
        }
        
        /* Sender Info */
        .sender-line {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255,255,255,0.5);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .sender-line .line {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,105,180,0.5), transparent);
        }
        
        .sender-line .name {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }
        
        /* Navigation Button */
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 16px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-top: 20px;
        }
        
        .nav-btn:hover {
            background: rgba(255,105,180,0.2);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255,105,180,0.3);
        }
        
        /* Message Section */
        .message-box {
            background: linear-gradient(145deg, rgba(255,105,180,0.08), rgba(255,20,147,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 50px 40px;
            position: relative;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(255,105,180,0.1),
                inset 0 0 60px rgba(255,105,180,0.02);
        }
        
        .quote-mark {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 120px;
            color: rgba(255,105,180,0.15);
            font-family: Georgia, serif;
            line-height: 1;
        }
        
        .message-text {
            font-size: 1.4rem;
            line-height: 2.2;
            color: rgba(255,255,255,0.9);
            text-align: center;
            position: relative;
            z-index: 1;
            white-space: pre-line;
        }
        
        .message-signature {
            text-align: center;
            color: rgba(255,255,255,0.4);
            margin-top: 30px;
            font-size: 1.1rem;
        }
        
        /* Photos Section */
        .album-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .album-title {
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }
        
        .album-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            margin: 15px auto;
        }
        
        .photos-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            perspective: 1000px;
        }
        
        .photo-frame {
            width: 220px;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,105,180,0.3);
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
            animation: photoGlow 3s ease-in-out infinite;
        }
        
        @keyframes photoGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,105,180,0.2), 0 0 40px rgba(255,20,147,0.1); }
            50% { box-shadow: 0 0 40px rgba(255,105,180,0.4), 0 0 80px rgba(255,20,147,0.2); }
        }
        
        .photo-frame:hover {
            transform: translateY(-10px) rotateY(5deg);
            box-shadow: 0 20px 60px rgba(255,105,180,0.4);
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .photo-frame:hover img {
            transform: scale(1.1);
        }
        
        /* Music Section */
        .music-player {
            text-align: center;
            padding: 40px;
        }
        
        .music-visualizer {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .music-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,105,180,0.3);
        }
        
        .music-ring:nth-child(1) {
            width: 200px;
            height: 200px;
            animation: ripple1 2s ease-out infinite;
        }
        
        .music-ring:nth-child(2) {
            width: 160px;
            height: 160px;
            animation: ripple2 2s ease-out infinite 0.3s;
        }
        
        .music-ring:nth-child(3) {
            width: 120px;
            height: 120px;
            animation: ripple3 2s ease-out infinite 0.6s;
        }
        
        @keyframes ripple1 {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        
        @keyframes ripple2 {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        
        @keyframes ripple3 {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .music-icon-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
            z-index: 1;
            animation: musicPulse 2s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(255,105,180,0.4);
            cursor: pointer;
            border: none;
            color: white;
        }
        
        @keyframes musicPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .music-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #ff69b4, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 3s linear infinite;
        }
        
        @keyframes textShine {
            to { background-position: 200% center; }
        }
        
        .music-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            margin-bottom: 30px;
        }
        
        .audio-player {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
        }
        
        audio {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
        }
        
        audio::-webkit-media-controls-panel {
            background: linear-gradient(135deg, rgba(255,105,180,0.2), rgba(255,20,147,0.1));
            border-radius: 25px;
        }
        
        /* Auto-open countdown */
        .countdown {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.4);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .countdown span {
            color: var(--primary);
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .message-box { padding: 30px 20px; }
            .photo-frame { width: 160px; height: 200px; }
            .music-visualizer { width: 150px; height: 150px; }
            .music-icon-btn { width: 80px; height: 80px; font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <!-- Section 1: Intro -->
        <section class="section intro active" id="intro">
            <div class="icon-wrapper">
                <span class="eid-icon">🌙✨</span>
            </div>
            <div class="badge">عيد الفطر المبارك</div>
            <h1 class="title">سعيدة الحظ</h1>
            <div class="sender-line">
                <div class="line"></div>
                <span>مُعدّة خصيصاً لـ</span>
                <span class="name">محمود</span>
                <div class="line"></div>
            </div>
            <button class="nav-btn" onclick="showSection('message')">
                اقرأ الرسالة
                <span style="animation: bounce 1s infinite;">↓</span>
            </button>
            <div class="countdown">ستُفتح تلقائياً خلال <span id="timer">8</span> ثانية</div>
        </section>
        
        <!-- Section 2: Message -->
        <section class="section" id="message">
            <div class="message-box">
                <div class="quote-mark">"</div>
                <p class="message-text">العيد لا الجمعة ولا السبت
العيد شوفتك ياگلبي ♥️</p>
            </div>
            <p class="message-signature">— محمود</p>
            <button class="nav-btn" onclick="showSection('photos')">
                شاهد الصور
                <span style="animation: bounce 1s infinite;">↓</span>
            </button>
        </section>
        
        <!-- Section 3: Photos -->
        <section class="section" id="photos">
            <div class="album-header">
                <div class="album-title">ألبوم الذكريات</div>
                <div class="album-line"></div>
            </div>
            <div class="photos-wrapper">
                <div class="photo-frame">
                    <img src="media/4a5998a3-8e9f-4462-bd10-fc07d59ed398.jpeg" alt="ذكرى 1">
                </div>
                <div class="photo-frame">
                    <img src="media/4d02a751-0c57-48da-858b-2d9f60e5d3eb.jpeg" alt="ذكرى 2">
                </div>
                <div class="photo-frame">
                    <img src="media/b2236159-c6b1-4595-9526-7da992c7325d.jpeg" alt="ذكرى 3">
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('music')">
                استمع للموسيقى
                <span style="animation: bounce 1s infinite;">↓</span>
            </button>
        </section>
        
        <!-- Section 4: Music -->
        <section class="section" id="music">
            <div class="music-player">
                <div class="music-visualizer">
                    <div class="music-ring"></div>
                    <div class="music-ring"></div>
                    <div class="music-ring"></div>
                    <button class="music-icon-btn" onclick="toggleMusic()">🎵</button>
                </div>
                <h2 class="music-title">موسيقى مختارة لك</h2>
                <p class="music-subtitle">اختارها <span style="color: var(--primary);">محمود</span> خصيصاً لهذه المناسبة</p>
                <div class="audio-player">
                    <audio id="audioPlayer" controls loop>
                        <source src="media/videoplayback.mp3" type="audio/mpeg">
                        متصفحك لا يدعم تشغيل الصوت
                    </audio>
                </div>
            </div>
        </section>
    </div>
    
    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const colors = ['#ff69b4', '#ff1493', '#ffb6c1', 'rgba(255,255,255,0.4)'];
        
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${Math.random() * 6 + 2}px;
                height: ${particle.style.width};
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-delay: ${Math.random() * 10}s;
                animation-duration: ${Math.random() * 10 + 10}s;
            `;
            particlesContainer.appendChild(particle);
        }
        
        // Section navigation
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            const section = document.getElementById(sectionId);
            section.style.display = 'flex';
            void section.offsetWidth;
            section.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Countdown timer
        let countdown = 8;
        const timerEl = document.getElementById('timer');
        const countdownInterval = setInterval(() => {
            countdown--;
            if (timerEl) timerEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                showSection('message');
            }
        }, 1000);
        
        // Music toggle
        let isPlaying = false;
        const audio = document.getElementById('audioPlayer');
        
        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
            isPlaying = !isPlaying;
        }
        
        // Add bounce animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
